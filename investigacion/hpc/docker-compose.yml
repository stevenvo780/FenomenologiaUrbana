# Despliegue dual-GPU para procesamiento de videos POV / saturación.
#
# proc-5070ti → RTX 5070 Ti (Blackwell sm_120), lote primario, yolo11x.pt
# proc-2060   → RTX 2060   (Turing sm_75),    lote secundario, yolo11s.pt
#
# Asignación de GPU vía CDI (Container Device Interface).
# Motivo: en kernel 6.17 con docker 29 + nvidia-container-toolkit 1.19 el path legacy
# (`--gpus all` / `runtime: nvidia` + `deploy.resources.reservations.devices`) tropieza
# con un bug de eBPF device-filter: "nvidia-container-cli: failed to add device rules:
# load program: invalid argument". CDI evita ese path inyectando los devices con OCI
# hooks limpios. Verificado funcional en ubuntu-raid (driver 580.142, 2026-05-07).
#
# Las CDI specs las publica el host en /var/run/cdi/nvidia.yaml.
# Listar dispositivos disponibles: `nvidia-ctk cdi list`.
#
# Lanzamiento desde investigacion/hpc/ en la torre:
#   docker compose build
#   docker compose up -d
#   docker compose logs -f
#
# Volúmenes esperados:
#   ../data/raw/video/       (videos crudos, montado RO)
#   ../data/processed/       (salida video_saturation_*.json)

services:
  proc-5070ti:
    build:
      context: .
      dockerfile: Dockerfile
    image: fenomurb/video-proc:cuda128
    container_name: fenomurb_proc_5070ti
    devices:
      - "nvidia.com/gpu=0"
    environment:
      - WORKER_NAME=worker_5070ti
      - WORKER_LOT=primary
      - YOLO_MODEL=yolo11x.pt
      - CONF_THRESH=0.35
    volumes:
      - ../data/raw/video:/data/raw/video:ro
      - ../data/processed:/data/processed
      - ./jobs:/jobs
      - ./logs:/logs
    command:
      - --jobs-dir=/jobs
      - --raw-dir=/data/raw/video
      - --out-dir=/data/processed
      - --worker-name=worker_5070ti
      - --lot=primary
    restart: unless-stopped

  proc-2060:
    build:
      context: .
      dockerfile: Dockerfile
    image: fenomurb/video-proc:cuda128
    container_name: fenomurb_proc_2060
    devices:
      - "nvidia.com/gpu=1"
    environment:
      - WORKER_NAME=worker_2060
      - WORKER_LOT=secondary
      - YOLO_MODEL=yolo11s.pt
      - CONF_THRESH=0.35
    volumes:
      - ../data/raw/video:/data/raw/video:ro
      - ../data/processed:/data/processed
      - ./jobs:/jobs
      - ./logs:/logs
    command:
      - --jobs-dir=/jobs
      - --raw-dir=/data/raw/video
      - --out-dir=/data/processed
      - --worker-name=worker_2060
      - --lot=secondary
    restart: unless-stopped
